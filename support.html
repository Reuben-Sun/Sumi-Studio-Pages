<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sumi Studio - Support</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            line-height: 1.8;
            color: #1d1d1f;
            background: #f5f5f7;
            padding: 40px 20px;
        }
        .container {
            max-width: 720px;
            margin: 0 auto;
            background: #fff;
            border-radius: 16px;
            padding: 48px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
        }
        h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
        }
        h2 {
            font-size: 18px;
            font-weight: 600;
            margin-top: 32px;
            margin-bottom: 12px;
        }
        p { margin-bottom: 16px; color: #333; }
        .subtitle { color: #86868b; font-size: 14px; margin-bottom: 32px; }
        .lang-switch {
            text-align: right;
            margin-bottom: 24px;
        }
        .lang-switch a {
            color: #0066cc;
            text-decoration: none;
            font-size: 14px;
            cursor: pointer;
        }
        .section { display: block; }
        .section.hidden { display: none; }
        a { color: #0066cc; text-decoration: none; }
        a:hover { text-decoration: underline; }
        .email-link {
            display: inline-block;
            margin-top: 8px;
            font-size: 16px;
            font-weight: 500;
            color: #0066cc;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="lang-switch">
            <a onclick="switchLang('zh')">中文</a> | <a onclick="switchLang('en')">English</a>
        </div>

        <div id="zh" class="section">
            <h1>技术支持</h1>
            <p class="subtitle">Sumi Studio</p>

            <h2>联系我们</h2>
            <p>如果您在使用 Sumi Studio 时遇到技术问题、有功能建议或需要报告 Bug，请通过以下邮箱联系我们：</p>
            <a class="email-link" href="mailto:reubensun728@gmail.com">reubensun728@gmail.com</a>
        </div>

        <div id="en" class="section hidden">
            <h1>Support</h1>
            <p class="subtitle">Sumi Studio</p>

            <h2>Contact Us</h2>
            <p>For technical support, feature requests, or bug reports regarding Sumi Studio, please contact us at:</p>
            <a class="email-link" href="mailto:reubensun728@gmail.com">reubensun728@gmail.com</a>
        </div>
    </div>

    <script>
        function switchLang(lang) {
            document.getElementById('zh').className = lang === 'zh' ? 'section' : 'section hidden';
            document.getElementById('en').className = lang === 'en' ? 'section' : 'section hidden';
        }
    </script>
</body>
</html>
